name: Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend and API static quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pinned v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # pinned v7.0.0
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable && pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test

      - name: Build workspace
        run: pnpm build

  go-quality:
    name: Go static quality and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pinned v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # pinned v7.0.0
        with:
          go-version: "1.25.1"
          cache-dependency-path: |
            apps/control-plane/go.sum
            apps/gpu-platform-addon/go.sum

      - name: Check module metadata
        run: |
          go -C apps/control-plane mod tidy
          go -C apps/gpu-platform-addon mod tidy
          git diff --exit-code -- \
            apps/control-plane/go.mod \
            apps/control-plane/go.sum \
            apps/gpu-platform-addon/go.mod \
            apps/gpu-platform-addon/go.sum

      - name: Check formatting
        run: |
          test -z "$(gofmt -l apps/control-plane/cmd apps/control-plane/internal apps/control-plane/migrations)"
          test -z "$(gofmt -l apps/gpu-platform-addon/cmd apps/gpu-platform-addon/internal)"

      - name: Vet and test control plane
        run: |
          go -C apps/control-plane vet ./...
          go -C apps/control-plane test ./...

      - name: Vet and test GPU Platform Add-on
        run: |
          go -C apps/gpu-platform-addon vet ./...
          go -C apps/gpu-platform-addon test ./...

      - name: Build Go commands
        run: |
          go -C apps/control-plane build ./cmd/...
          go -C apps/gpu-platform-addon build -o "${RUNNER_TEMP}/gpu-platform-addon" ./cmd/gpu-platform-addon

  delivery-static:
    name: Delivery configuration static checks
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      MONGO_DATABASE: gpu_rental_ci
      MONGO_ROOT_USERNAME: gpu_ci
      MONGO_ROOT_PASSWORD: ci_only_mongo_password
      POSTGRES_DATABASE: gpu_cloud_ci
      POSTGRES_USER: gpu_cloud_ci
      POSTGRES_PASSWORD: ci_only_postgres_password
      REDIS_PASSWORD: ci_only_redis_password
      SESSION_TTL_SECONDS: "3600"
      WEB_ORIGIN: http://localhost:8080
      COOKIE_SECURE: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pinned v7.0.0

      - name: Install pinned delivery tools
        run: |
          bash deploy/ocm/scripts/validate-versions.sh
          bash deploy/ocm/scripts/install-tools.sh
          source deploy/ocm/scripts/lib.sh
          echo "${BIN_DIR}" >> "${GITHUB_PATH}"

      - name: Lint delivery charts
        run: |
          source deploy/ocm/versions.env
          kube_version="${KUBERNETES_VERSION#v}"
          helm lint charts/gpu-platform-addon --kube-version "${kube_version}"
          helm lint charts/gpu-control-plane --kube-version "${kube_version}"
          helm lint charts/gpu-observability --kube-version "${kube_version}"

      - name: Validate delivery scripts
        run: |
          bash -n deploy/ocm/scripts/*.sh
          bash -n deploy/control-plane/scripts/*.sh
          bash -n deploy/observability/scripts/*.sh
          bash -n deploy/gpustack/scripts/*.sh
          python3 -c "import ast,pathlib; ast.parse(pathlib.Path('deploy/observability/scripts/s3-fixture.py').read_text(encoding='utf-8'))"
          bash deploy/observability/scripts/validate-versions.sh
          bash deploy/gpustack/scripts/validate-versions.sh

      - name: Validate Compose configuration
        run: |
          docker compose config --quiet
          docker compose -f docker-compose.v2.yml config --quiet
  pages:
    name: Build and deploy default GitHub Pages demo
    needs: [frontend, go-quality, delivery-static]
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: github-pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout classic release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 固定 v7.0.0
        with:
          ref: refs/tags/ui-v1.0.0
          path: classic-source

      - name: Checkout current release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 固定 v7.0.0
        with:
          ref: ${{ github.sha }}
          path: release-source

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # 固定 v7.0.0
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable && pnpm --version

      - name: Install classic dependencies
        working-directory: classic-source
        run: pnpm install --frozen-lockfile

      - name: Install current release dependencies
        working-directory: release-source
        run: pnpm install --frozen-lockfile

      - name: Build classic demo
        env:
          VITE_RUNTIME_MODE: demo
          VITE_BASE_PATH: /gpu-rental-platform/classic/
        working-directory: classic-source
        run: pnpm --filter @gpu-rental/web exec vite build --base=/gpu-rental-platform/classic/

      - name: Build default demo
        env:
          VITE_RUNTIME_MODE: demo
          VITE_BASE_PATH: /gpu-rental-platform/
        working-directory: release-source
        run: pnpm --filter @gpu-rental/web exec vite build --base=/gpu-rental-platform/

      - name: Assemble default and classic site
        run: |
          mkdir -p pages-root
          cp -R release-source/apps/web/dist/. pages-root/
          mkdir -p pages-root/classic pages-root/next
          cp -R classic-source/apps/web/dist/. pages-root/classic/
          cp release-source/apps/web/dist/index.html pages-root/404.html
          cp release-source/apps/web/dist/index.html pages-root/next/index.html
          cp release-source/apps/web/dist/favicon.svg pages-root/classic/favicon.svg
          sed -i '/<meta name="theme-color"/a\    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />' pages-root/classic/index.html
          touch pages-root/.nojekyll

      - name: Verify default and classic site
        run: |
          test -f pages-root/index.html
          test -f pages-root/classic/index.html
          test -f pages-root/classic/favicon.svg
          test -f pages-root/next/index.html
          grep -q '/gpu-rental-platform/' pages-root/index.html
          ! grep -q '/gpu-rental-platform/next/' pages-root/index.html
          grep -q 'rel="icon"' pages-root/classic/index.html
          grep -q '/gpu-rental-platform/classic/' pages-root/classic/index.html
          cmp -s pages-root/index.html pages-root/next/index.html

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # 固定 v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # 固定 v5.0.0
        with:
          path: pages-root

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # 固定 v5.0.0
