name: Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - ui/interactive-console-v2
  pull_request:

permissions:
  contents: read

env:
  MONGO_DATABASE: gpu_rental_ci
  MONGO_ROOT_USERNAME: gpu_ci
  MONGO_ROOT_PASSWORD: ci_only_mongo_password
  REDIS_PASSWORD: ci_only_redis_password
  SESSION_TTL_SECONDS: "3600"
  WEB_ORIGIN: http://localhost:8080
  COOKIE_SECURE: "false"

jobs:
  quality:
    name: Quality and container build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mongo:
        image: mongo:8.0
        env:
          MONGO_INITDB_DATABASE: gpu_rental_ci
          MONGO_INITDB_ROOT_USERNAME: gpu_ci
          MONGO_INITDB_ROOT_PASSWORD: ci_only_mongo_password
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --username gpu_ci --password ci_only_mongo_password --authenticationDatabase admin --eval 'quit(db.adminCommand({ ping: 1 }).ok ? 0 : 2)'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 20s
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 5s
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 固定 v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 固定 v6.4.0
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable && pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test

      - name: Run API end-to-end tests
        env:
          MONGO_URI: mongodb://gpu_ci:ci_only_mongo_password@127.0.0.1:27017/gpu_rental_ci?authSource=admin
          REDIS_URL: redis://127.0.0.1:6379
        run: pnpm test:e2e

      - name: Build workspace
        run: pnpm build

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build container images
        run: docker compose build

  pages:
    name: Build and deploy versioned GitHub Pages demos
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: github-pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout classic release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 固定 v7.0.0
        with:
          ref: refs/tags/ui-v1.0.0
          path: classic-source

      - name: Checkout interactive console
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 固定 v7.0.0
        with:
          ref: refs/heads/ui/interactive-console-v2
          path: next-source

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 固定 v6.4.0
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable && pnpm --version

      - name: Install classic dependencies
        working-directory: classic-source
        run: pnpm install --frozen-lockfile

      - name: Install interactive console dependencies
        working-directory: next-source
        run: pnpm install --frozen-lockfile

      - name: Build classic demo
        env:
          VITE_RUNTIME_MODE: demo
          VITE_BASE_PATH: /gpu-rental-platform/classic/
        working-directory: classic-source
        run: pnpm --filter @gpu-rental/web exec vite build --base=/gpu-rental-platform/classic/

      - name: Build interactive console demo
        env:
          VITE_RUNTIME_MODE: demo
          VITE_BASE_PATH: /gpu-rental-platform/next/
        working-directory: next-source
        run: pnpm --filter @gpu-rental/web exec vite build --base=/gpu-rental-platform/next/

      - name: Assemble versioned site
        run: |
          mkdir -p pages-root/classic pages-root/next
          cp -R classic-source/apps/web/dist/. pages-root/classic/
          cp -R next-source/apps/web/dist/. pages-root/next/
          cp next-source/deploy/pages-index.html pages-root/index.html
          cp next-source/deploy/pages-index.html pages-root/404.html
          cp next-source/apps/web/dist/favicon.svg pages-root/favicon.svg
          cp next-source/apps/web/dist/favicon.svg pages-root/classic/favicon.svg
          sed -i '/<meta name="theme-color"/a\    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />' pages-root/classic/index.html
          touch pages-root/.nojekyll

      - name: Verify versioned site
        run: |
          test -f pages-root/index.html
          test -f pages-root/classic/index.html
          test -f pages-root/classic/favicon.svg
          test -f pages-root/next/index.html
          grep -q 'rel="icon"' pages-root/classic/index.html
          grep -q '/gpu-rental-platform/classic/' pages-root/classic/index.html
          grep -q '/gpu-rental-platform/next/' pages-root/next/index.html

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # 固定 v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # 固定 v5.0.0
        with:
          path: pages-root

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # 固定 v5.0.0
