apiVersion: v1
kind: Service
metadata:
  name: gpu-control-plane-postgres
  namespace: gpu-control-plane-system
  labels:
    app.kubernetes.io/name: gpu-control-plane-postgres
    app.kubernetes.io/component: database
spec:
  selector:
    app.kubernetes.io/name: gpu-control-plane-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gpu-control-plane-postgres
  namespace: gpu-control-plane-system
  labels:
    app.kubernetes.io/name: gpu-control-plane-postgres
    app.kubernetes.io/component: database
spec:
  serviceName: gpu-control-plane-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gpu-control-plane-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gpu-control-plane-postgres
        app.kubernetes.io/component: database
    spec:
      automountServiceAccountToken: false
      containers:
        - name: postgres
          image: postgres:17
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: gpu_cloud
            - name: POSTGRES_USER
              value: gpu_cloud
            - name: POSTGRES_PASSWORD
              value: ci-only-ha-password
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command:
                - pg_isready
                - --username=gpu_cloud
                - --dbname=gpu_cloud
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          livenessProbe:
            exec:
              command:
                - pg_isready
                - --username=gpu_cloud
                - --dbname=gpu_cloud
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
