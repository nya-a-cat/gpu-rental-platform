<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Kiloworks GPU 资源租赁平台 Classic 与 Next 版本入口。"
    />
    <meta name="theme-color" content="#171814" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <title>Kiloworks · Version Bay</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Arial Narrow", "Noto Sans SC", sans-serif;
        background: #11130f;
        color: #eee4cd;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
        background:
          linear-gradient(rgb(15 17 13 / 0.86), rgb(15 17 13 / 0.94)),
          repeating-linear-gradient(
            90deg,
            transparent 0 63px,
            rgb(255 255 255 / 0.03) 64px
          ),
          #171914;
      }

      main {
        width: min(980px, 100%);
        border: 1px solid #5e6057;
        background: #1c1e19;
        box-shadow:
          inset 0 0 0 8px #141612,
          18px 24px 60px rgb(0 0 0 / 0.45);
      }

      header {
        display: grid;
        gap: 10px;
        padding: clamp(28px, 5vw, 54px);
        border-bottom: 3px solid #d95731;
      }

      header span,
      article small,
      footer {
        color: #9c988b;
        font:
          600 11px/1.4 ui-monospace,
          monospace;
        letter-spacing: 0.09em;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        max-width: 760px;
        font-size: clamp(42px, 8vw, 78px);
        line-height: 0.9;
        letter-spacing: -0.045em;
      }

      h1 em {
        display: block;
        color: #e35d35;
        font-style: normal;
      }

      .versions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        padding: 1px;
        background: #4e5048;
      }

      article {
        min-height: 260px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: clamp(24px, 4vw, 42px);
        background: #272922;
      }

      article:last-child {
        background:
          linear-gradient(135deg, rgb(218 85 47 / 0.12), transparent 46%),
          #20221d;
      }

      h2 {
        font-size: clamp(30px, 5vw, 46px);
        line-height: 1;
      }

      article p {
        max-width: 390px;
        color: #bcb5a4;
        line-height: 1.7;
      }

      a {
        width: fit-content;
        margin-top: auto;
        padding: 13px 18px;
        color: #fff4dd;
        border: 1px solid #a23e23;
        background: #d95731;
        box-shadow: inset 0 -4px 0 #a53b21;
        font-weight: 800;
        text-decoration: none;
      }

      a:hover,
      a:focus-visible {
        filter: brightness(1.12);
        transform: translateY(-1px);
      }

      footer {
        padding: 16px clamp(24px, 4vw, 42px);
        border-top: 1px solid #55574f;
      }

      @media (max-width: 680px) {
        body {
          padding: 12px;
        }

        .versions {
          grid-template-columns: 1fr;
        }

        article {
          min-height: 220px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <span>KILOWORKS / VERSION BAY / 2026</span>
        <h1>选择控制台。<em>新旧版本都保留。</em></h1>
      </header>
      <section class="versions" aria-label="可用版本">
        <article>
          <small>CLASSIC / UI-V1.0.0 / FROZEN</small>
          <h2>稳定旧版</h2>
          <p>冻结在确认过的工业控制室界面，不随新版施工变化。</p>
          <a href="./classic/">打开 Classic</a>
        </article>
        <article>
          <small>NEXT / INTERACTIVE CONSOLE V2</small>
          <h2>交互新版</h2>
          <p>
            更紧凑的首屏、实时库存机架，以及会直接改变筛选结果的机械控制台。
          </p>
          <a href="./next/">打开 Next</a>
        </article>
      </section>
      <footer>DEMO STATE IS ISOLATED BETWEEN CLASSIC AND NEXT</footer>
    </main>
  </body>
</html>
