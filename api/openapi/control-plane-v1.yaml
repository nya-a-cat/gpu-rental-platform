      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MutationAcceptance"
    ProblemResponse:
      description: The request was rejected or a required dependency is unavailable.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    InternalError:
      description: The request failed because of an unexpected server error.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
