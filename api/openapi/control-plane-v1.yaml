openapi: 3.1.0
info:
  title: GPU Container Cloud Control Plane API
  version: 0.3.0
  summary: Phase 1 tenancy and vendor resource catalog contract for the GPU Container Cloud control plane.
  description: |
    This document defines the initial versioned `/api/v1` surface for the v2 control
    plane. The current contract exposes health, telemetry discovery, build
    information, asynchronous operation status, tenants, projects, role bindings,
    project quotas, clusters, inventory, accelerator profiles, capacity pools, and GPU Workspace instances.

    Every state-changing endpoint under `/api/v1` MUST require an
    `Idempotency-Key` header and return an Operation reference when work is
    accepted asynchronously. Request correlation uses `X-Request-ID`; W3C
    `traceparent` and `tracestate` are reserved in the contract for the later
    OpenTelemetry integration.
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
servers:
  - url: /
    description: Same-origin control-plane endpoint
tags:
  - name: Health
  - name: Observability
  - name: System
  - name: Operations
  - name: Tenants
  - name: Projects
  - name: IAM
  - name: Quotas
  - name: Resource Catalog
  - name: Instances
  - name: Capacity
paths:
  /health/live:
    get:
      tags: [Health]
      operationId: getLiveness
      summary: Check whether the process is alive.
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceParent"
        - $ref: "#/components/parameters/TraceState"
      responses:
        "200":
          description: The process is alive.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "500":
          $ref: "#/components/responses/InternalError"
  /health/ready:
    get:
      tags: [Health]
      operationId: getReadiness
      summary: Check whether required control-plane dependencies are ready.
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceParent"
        - $ref: "#/components/parameters/TraceState"
      responses:
        "200":
          description: Required dependencies are ready.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessStatus"
        "503":
          description: One or more required dependencies are unavailable.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          $ref: "#/components/responses/InternalError"
  /metrics:
    get:
      tags: [Observability]
      operationId: getPrometheusMetrics
      summary: Expose Prometheus-compatible control-plane metrics.
      parameters:
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Prometheus text exposition payload.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            text/plain:
              schema:
                type: string
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/system/info:
    get:
      tags: [System]
      operationId: getSystemInfo
      summary: Return immutable build and API compatibility information.
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceParent"
        - $ref: "#/components/parameters/TraceState"
      responses:
        "200":
          description: Control-plane build information.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemInfo"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/operations/{operationId}:
    get:
      tags: [Operations]
      operationId: getOperation
      summary: Retrieve the latest state of an asynchronous operation.
      parameters:
        - $ref: "#/components/parameters/OperationId"
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/TraceParent"
        - $ref: "#/components/parameters/TraceState"
      responses:
        "200":
          description: The operation was found.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "400":
          description: The operation identifier is malformed.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: No operation exists for the supplied identifier.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Operation storage is unavailable.
          headers:
            X-Request-ID:
              $ref: "#/components/headers/RequestId"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/tenants:
    post:
      tags: [Tenants]
      operationId: createTenant
      summary: Accept creation of a tenant account.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
      responses:
        "202":
          $ref: "#/components/responses/MutationAccepted"
        "400":
          $ref: "#/components/responses/ProblemResponse"
        "401":
          $ref: "#/components/responses/ProblemResponse"
        "403":
          $ref: "#/components/responses/ProblemResponse"
        "409":
          $ref: "#/components/responses/ProblemResponse"
        "503":
          $ref: "#/components/responses/ProblemResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/tenants/{tenantId}:
    get:
      tags: [Tenants]
      operationId: getTenant
      summary: Retrieve a tenant account.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: The tenant was found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "401":
          $ref: "#/components/responses/ProblemResponse"
        "403":
          $ref: "#/components/responses/ProblemResponse"
        "404":
          $ref: "#/components/responses/ProblemResponse"
        "503":
          $ref: "#/components/responses/ProblemResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/projects:
    post:
      tags: [Projects]
      operationId: createProject
      summary: Accept creation of a shared-isolation project.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "202":
          $ref: "#/components/responses/MutationAccepted"
        "400":
          $ref: "#/components/responses/ProblemResponse"
        "401":
          $ref: "#/components/responses/ProblemResponse"
        "403":
          $ref: "#/components/responses/ProblemResponse"
        "404":
          $ref: "#/components/responses/ProblemResponse"
        "409":
          $ref: "#/components/responses/ProblemResponse"
        "503":
          $ref: "#/components/responses/ProblemResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/projects/{projectId}:
    get:
      tags: [Projects]
      operationId: getProject
      summary: Retrieve a project and its isolation state.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: The project was found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/ProblemResponse"
        "403":
          $ref: "#/components/responses/ProblemResponse"
        "404":
          $ref: "#/components/responses/ProblemResponse"
        "503":
          $ref: "#/components/responses/ProblemResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/role-bindings:
    post:
      tags: [IAM]
      operationId: createRoleBinding
      summary: Accept creation of a tenant or project role binding.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleBindingRequest"
      responses:
        "202":
          $ref: "#/components/responses/MutationAccepted"
        "400":
          $ref: "#/components/responses/ProblemResponse"
        "401":
          $ref: "#/components/responses/ProblemResponse"
        "403":
          $ref: "#/components/responses/ProblemResponse"
        "404":
          $ref: "#/components/responses/ProblemResponse"
        "409":
          $ref: "#/components/responses/ProblemResponse"
        "503":
          $ref: "#/components/responses/ProblemResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/role-bindings/{bindingId}:
    get:
      tags: [IAM]
      operationId: getRoleBinding
      summary: Retrieve a tenant or project role binding.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/BindingId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: The role binding was found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleBinding"
        "401":
          $ref: "#/components/responses/ProblemResponse"
        "403":
          $ref: "#/components/responses/ProblemResponse"
        "404":
          $ref: "#/components/responses/ProblemResponse"
        "503":
          $ref: "#/components/responses/ProblemResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/projects/{projectId}/quotas/{resourceClass}:
    get:
      tags: [Quotas]
      operationId: getProjectQuota
      summary: Retrieve a project quota.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/ResourceClass"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: The quota was found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quota"
        "401":
          $ref: "#/components/responses/ProblemResponse"
        "403":
          $ref: "#/components/responses/ProblemResponse"
        "404":
          $ref: "#/components/responses/ProblemResponse"
        "503":
          $ref: "#/components/responses/ProblemResponse"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags: [Quotas]
      operationId: setProjectQuota
      summary: Accept creation or replacement of a project quota limit.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/ResourceClass"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetQuotaRequest"
      responses:
        "202":
          $ref: "#/components/responses/MutationAccepted"
        "400":
          $ref: "#/components/responses/ProblemResponse"
        "401":
          $ref: "#/components/responses/ProblemResponse"
        "403":
          $ref: "#/components/responses/ProblemResponse"
        "404":
          $ref: "#/components/responses/ProblemResponse"
        "409":
          $ref: "#/components/responses/ProblemResponse"
        "503":
          $ref: "#/components/responses/ProblemResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/resource-classes/{resourceClass}:
    get:
      tags: [Resource Catalog]
      operationId: getResourceClass
      summary: Retrieve a resource class definition.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/ResourceClass"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: The resource class was found.
          content:
            {
              application/json:
                {
                  schema:
                    { $ref: "#/components/schemas/ResourceClassDefinition" },
                },
            }
        "401": { $ref: "#/components/responses/ProblemResponse" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/clusters:
    post:
      tags: [Resource Catalog]
      operationId: createCluster
      summary: Register an OCM managed cluster in the vendor catalog.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          {
            application/json:
              { schema: { $ref: "#/components/schemas/CreateClusterRequest" } },
          }
      responses:
        "202": { $ref: "#/components/responses/MutationAccepted" }
        "400": { $ref: "#/components/responses/ProblemResponse" }
        "401": { $ref: "#/components/responses/ProblemResponse" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/clusters/{clusterId}:
    get:
      tags: [Resource Catalog]
      operationId: getCluster
      summary: Retrieve cluster connectivity and inventory state.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/ClusterId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: The cluster was found.
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/Cluster" } },
            }
        "401": { $ref: "#/components/responses/ProblemResponse" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/clusters/{clusterId}/inventory:
    get:
      tags: [Resource Catalog]
      operationId: getClusterInventory
      summary: Retrieve the vendor-only detailed cluster inventory.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/ClusterId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: The inventory was found.
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/ClusterInventory" } },
            }
        "401": { $ref: "#/components/responses/ProblemResponse" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "500": { $ref: "#/components/responses/InternalError" }
    put:
      tags: [Resource Catalog]
      operationId: replaceClusterInventory
      summary: Atomically replace a cluster inventory snapshot using optimistic concurrency.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/ClusterId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          {
            application/json:
              {
                schema:
                  { $ref: "#/components/schemas/ReplaceInventoryRequest" },
              },
          }
      responses:
        "202": { $ref: "#/components/responses/MutationAccepted" }
        "400": { $ref: "#/components/responses/ProblemResponse" }
        "401": { $ref: "#/components/responses/ProblemResponse" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/accelerator-profiles:
    post:
      tags: [Capacity]
      operationId: createAcceleratorProfile
      summary: Create a Real Alpha whole-GPU product profile.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          {
            application/json:
              {
                schema:
                  {
                    $ref: "#/components/schemas/CreateAcceleratorProfileRequest",
                  },
              },
          }
      responses:
        "202": { $ref: "#/components/responses/MutationAccepted" }
        "400": { $ref: "#/components/responses/ProblemResponse" }
        "401": { $ref: "#/components/responses/ProblemResponse" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/accelerator-profiles/{profileId}:
    get:
      tags: [Capacity]
      operationId: getAcceleratorProfile
      summary: Retrieve an accelerator product profile.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/ProfileId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: The accelerator profile was found.
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/AcceleratorProfile" } },
            }
        "401": { $ref: "#/components/responses/ProblemResponse" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/capacity-pools:
    post:
      tags: [Capacity]
      operationId: createCapacityPool
      summary: Bind a node pool to one accelerator and scheduler profile.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          {
            application/json:
              {
                schema:
                  { $ref: "#/components/schemas/CreateCapacityPoolRequest" },
              },
          }
      responses:
        "202": { $ref: "#/components/responses/MutationAccepted" }
        "400": { $ref: "#/components/responses/ProblemResponse" }
        "401": { $ref: "#/components/responses/ProblemResponse" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/capacity-pools/{poolId}:
    get:
      tags: [Capacity]
      operationId: getCapacityPool
      summary: Retrieve a capacity pool.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/CapacityPoolId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: The capacity pool was found.
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/CapacityPool" } },
            }
        "401": { $ref: "#/components/responses/ProblemResponse" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/instances:
    post:
      tags: [Instances]
      operationId: createInstance
      summary: Create a GPU Workspace instance.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInstanceRequest" }
      responses:
        "202": { $ref: "#/components/responses/MutationAccepted" }
        "400": { $ref: "#/components/responses/ProblemResponse" }
        "401": { $ref: "#/components/responses/ProblemResponse" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "409": { $ref: "#/components/responses/ProblemResponse" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/instances/{instanceId}:
    parameters:
      - name: instanceId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Instances]
      operationId: getInstance
      summary: Retrieve a GPU Workspace instance.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: The instance was found.
          content:
            application/json:
              { schema: { $ref: "#/components/schemas/Instance" } }
        "401": { $ref: "#/components/responses/ProblemResponse" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "500": { $ref: "#/components/responses/InternalError" }
    patch:
      tags: [Instances]
      operationId: setInstanceDesiredState
      summary: Change the desired lifecycle state of an instance.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            {
              schema:
                { $ref: "#/components/schemas/SetInstanceDesiredStateRequest" },
            }
      responses:
        "202": { $ref: "#/components/responses/MutationAccepted" }
        "400": { $ref: "#/components/responses/ProblemResponse" }
        "401": { $ref: "#/components/responses/ProblemResponse" }
        "403": { $ref: "#/components/responses/ProblemResponse" }
        "404": { $ref: "#/components/responses/ProblemResponse" }
        "500": { $ref: "#/components/responses/InternalError" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  parameters:
    OperationId:
      name: operationId
      in: path
      required: true
      description: Stable operation identifier.
      schema:
        type: string
        format: uuid
    TenantId:
      name: tenantId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BindingId:
      name: bindingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ResourceClass:
      name: resourceClass
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z0-9][a-z0-9._-]{0,63}$"
    ClusterId:
      name: clusterId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ProfileId:
      name: profileId
      in: path
      required: true
      schema: { type: string, format: uuid }
    CapacityPoolId:
      name: poolId
      in: path
      required: true
      schema: { type: string, format: uuid }
    RequestId:
      name: X-Request-ID
      in: header
      required: false
      description: Caller-supplied correlation identifier. The server generates one when omitted.
      schema:
        type: string
        minLength: 1
        maxLength: 128
    TraceParent:
      name: traceparent
      in: header
      required: false
      description: Reserved W3C Trace Context parent passthrough contract; the current service does not create or export spans.
      schema:
        type: string
        maxLength: 255
    TraceState:
      name: tracestate
      in: header
      required: false
      description: Reserved W3C Trace Context vendor-state passthrough contract; the current service does not create or export spans.
      schema:
        type: string
        maxLength: 512
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        Unique key scoped to the authenticated principal and endpoint. Replaying
        the same request body returns the original result; reusing the key with a
        different body returns a conflict.
      schema:
        type: string
        minLength: 8
        maxLength: 255
  headers:
