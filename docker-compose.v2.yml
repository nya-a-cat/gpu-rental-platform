name: gpu-cloud-control-plane-v2

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-gpu_cloud}
      POSTGRES_USER: ${POSTGRES_USER:-gpu_cloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - control-plane-backend
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  control-plane-migrate:
    build:
      context: .
      dockerfile: infra/control-plane.Dockerfile
    entrypoint:
      - /usr/local/bin/control-plane-migrate
    command:
      - up
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-gpu_cloud}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DATABASE:-gpu_cloud}?sslmode=disable
      MIGRATION_TIMEOUT: ${MIGRATION_TIMEOUT:-5m}
      MIGRATION_LOCK_TIMEOUT: ${MIGRATION_LOCK_TIMEOUT:-30s}
      MIGRATION_STATEMENT_TIMEOUT: ${MIGRATION_STATEMENT_TIMEOUT:-2m}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - control-plane-backend
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: "no"

  control-plane:
    build:
      context: .
      dockerfile: infra/control-plane.Dockerfile
    restart: unless-stopped
    init: true
    stop_grace_period: ${CONTROL_PLANE_STOP_GRACE_PERIOD:-20s}
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-gpu_cloud}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DATABASE:-gpu_cloud}?sslmode=disable
      CONTROL_PLANE_VERSION: ${CONTROL_PLANE_VERSION:-dev}
      CONTROL_PLANE_COMMIT: ${CONTROL_PLANE_COMMIT:-unknown}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-15s}
      READINESS_TIMEOUT: ${READINESS_TIMEOUT:-2s}
      AGENT_HEARTBEAT_INTERVAL: ${AGENT_HEARTBEAT_INTERVAL:-15s}
      AGENT_DEGRADED_AFTER: ${AGENT_DEGRADED_AFTER:-45s}
      AGENT_OFFLINE_AFTER: ${AGENT_OFFLINE_AFTER:-90s}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-20}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-5}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-30m}
    depends_on:
      control-plane-migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8081:8080"
    networks:
      - control-plane-backend
      - control-plane-edge
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        - CMD
        - /usr/local/bin/control-plane-healthcheck
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:

networks:
  control-plane-backend:
    internal: true
  control-plane-edge:
    internal: false
