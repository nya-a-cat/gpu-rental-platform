apiVersion: v1
kind: Service
metadata:
  name: {{ include "gpu-observability.fullname" . }}-otel-collector
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gpu-observability.componentLabels" (dict "root" . "component" "otel-collector") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: metrics
      port: 8888
      targetPort: metrics
    - name: health
      port: 13133
      targetPort: health
  selector:
    {{- include "gpu-observability.selectorLabels" (dict "root" . "component" "otel-collector") | nindent 4 }}
