apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gpu-observability.fullname" . }}-otel-collector
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gpu-observability.componentLabels" (dict "root" . "component" "otel-collector") | nindent 4 }}
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      prometheus:
        config:
          scrape_configs:
            - job_name: gpu-control-plane
              scrape_interval: 15s
              metrics_path: /metrics
              static_configs:
                - targets:
                    - {{ .Values.controlPlaneMetricsTarget | quote }}
    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: {{ .Values.otelCollector.memoryLimitMiB }}
      batch: {}
    exporters:
      nop: {}
    service:
      extensions:
        - health_check
      telemetry:
        metrics:
          level: normal
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
      pipelines:
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch
          exporters:
            - nop
        metrics:
          receivers:
            - otlp
            - prometheus
          processors:
            - memory_limiter
            - batch
          exporters:
            - nop
        logs:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch
          exporters:
            - nop
