apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gpu-observability.fullname" . }}-alertmanager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gpu-observability.componentLabels" (dict "root" . "component" "alertmanager") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "gpu-observability.selectorLabels" (dict "root" . "component" "alertmanager") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gpu-observability.selectorLabels" (dict "root" . "component" "alertmanager") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/alertmanager-configmap.yaml") . | sha256sum }}
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: alertmanager
          image: {{ include "gpu-observability.image" .Values.alertmanager.image | quote }}
          imagePullPolicy: {{ .Values.alertmanager.image.pullPolicy }}
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
          ports:
            - name: http
              containerPort: 9093
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.alertmanager.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
              readOnly: true
            - name: data
              mountPath: /alertmanager
      volumes:
        - name: config
          configMap:
            name: {{ include "gpu-observability.fullname" . }}-alertmanager
        - name: data
          emptyDir:
            sizeLimit: {{ .Values.alertmanager.storageSizeLimit }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
