apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gpu-platform-addon.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gpu-platform-addon.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "gpu-platform-addon.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gpu-platform-addon.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "gpu-platform-addon.serviceAccountName" . }}
      terminationGracePeriodSeconds: 30
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: {{ include "gpu-platform-addon.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - manager
            - {{ printf "--agent-image=%s" (include "gpu-platform-addon.image" .) | quote }}
            - {{ printf "--addon-name=%s" .Values.addonName | quote }}
            - {{ printf "--agent-install-namespace=%s" .Values.agent.installNamespace | quote }}
            - {{ printf "--report-interval=%s" .Values.agent.reportInterval | quote }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
