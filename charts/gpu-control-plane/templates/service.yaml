apiVersion: v1
kind: Service
metadata:
  name: {{ include "gpu-control-plane.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gpu-control-plane.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      protocol: TCP
      targetPort: http
  selector:
    {{- include "gpu-control-plane.selectorLabels" . | nindent 4 }}
